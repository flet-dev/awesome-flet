name: Validation

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly (Mon 06:00 UTC) — catch links that died after merge
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate apps.yml and README table
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Validate apps.yml and the README table are in sync
        run: uv run scripts/apps.py check

  links:
    name: Check links (advisory)
    runs-on: ubuntu-latest
    # Advisory: a store page returning 403 to bots, or a transient timeout,
    # should never block a good PR. Real dead links still show up here.
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Accept bot-blocked store/CDN responses
          args: --accept 200,206,403,429 --max-retries 2 --verbose README.md CONTRIBUTING.md
          fail: true
